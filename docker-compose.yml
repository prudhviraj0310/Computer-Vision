version: '3.8'

services:
  # Database container
  db:
    image: postgres:15-alpine
    container_name: trafficeye_db
    environment:
      POSTGRES_USER: trafficeye
      POSTGRES_PASSWORD: trafficeye_secure
      POSTGRES_DB: trafficeye_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trafficeye -d trafficeye_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis broker for Celery tasks and caching
  redis:
    image: redis:alpine
    container_name: trafficeye_redis
    ports:
      - "6379:6379"

  # FastAPI Web API
  web:
    build: .
    container_name: trafficeye_api
    environment:
      - DATABASE_URL=postgresql://trafficeye:trafficeye_secure@db/trafficeye_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Computer Vision Worker
  celery_worker:
    build: .
    container_name: trafficeye_worker
    environment:
      - DATABASE_URL=postgresql://trafficeye:trafficeye_secure@db/trafficeye_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    entrypoint: celery -A main.celery worker --loglevel=info

  # Frontend served via Nginx Reverse Proxy
  frontend:
    image: nginx:alpine
    container_name: trafficeye_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  postgres_data:
